<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manutencao</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2a37;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 0 0 16px;
      line-height: 1.5;
    }
    .muted {
      color: #6b7280;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Estamos em manutencao</h1>
    <p>O site esta temporariamente fora do ar para melhorias.</p>
    <p class="muted">Tente novamente em alguns minutos.</p>
  </div>
</body>
</html>
